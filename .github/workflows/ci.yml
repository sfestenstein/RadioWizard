# =============================================================================
# RadioWizard CI/CD Pipeline
# =============================================================================
# Triggers on push to main branch
# Builds and tests on Linux (GCC) and macOS (Clang)
# =============================================================================

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  BUILD_TYPE: Debug

jobs:
  # ===========================================================================
  # Linux Build (Ubuntu with GCC)
  # ===========================================================================
  linux-build:
    name: Linux (GCC)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            ninja-build \
            python3-pip \
            lcov \
            librtlsdr-dev \
            libiio-dev \
            libad9361-dev \
            libgl-dev \
            xkb-data

      - name: Install Conan
        run: |
          pip3 install conan --break-system-packages
          conan profile detect --force

      - name: Cache Conan packages
        uses: actions/cache@v4
        with:
          path: ~/.conan2
          key: ${{ runner.os }}-conan-${{ hashFiles('conanfile.py') }}
          restore-keys: |
            ${{ runner.os }}-conan-

      - name: Install dependencies with Conan
        run: |
          conan install . \
            --output-folder=build \
            --build=missing \
            -s build_type=Release \
            -s compiler.cppstd=gnu20 \
            -c tools.system.package_manager:mode=install \
            -c tools.system.package_manager:sudo=True

      - name: Configure CMake
        run: cmake --preset ci-linux

      - name: Build
        run: cmake --build --preset ci-linux

      - name: Run tests
        run: ctest --preset ci-linux

      - name: Generate coverage report
        run: |
          cd build/ci-linux
          LCOV_IGNORE="--ignore-errors inconsistent,mismatch,unused,negative"
          lcov --capture --directory . --output-file coverage.info --gcov-tool gcov $LCOV_IGNORE
          lcov --remove coverage.info '/usr/*' '*/build/*' '*/tests/*' --output-file coverage.info $LCOV_IGNORE
          lcov --list coverage.info $LCOV_IGNORE

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: build/ci-linux/coverage.info
          fail_ci_if_error: false
          verbose: true
        continue-on-error: true

  # ===========================================================================
  # macOS Build (Clang)
  # ===========================================================================
  macos-build:
    name: macOS (Clang)
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          brew install cmake ninja protobuf librtlsdr libusb libxml2

      - name: Build and install libiio from source
        run: |
          git clone --depth 1 --branch v0.26 https://github.com/analogdevicesinc/libiio.git /tmp/libiio
          cmake -S /tmp/libiio -B /tmp/libiio/build \
            -DCMAKE_INSTALL_PREFIX="$(brew --prefix)" \
            -DOSX_FRAMEWORK=OFF \
            -DOSX_PACKAGE=OFF \
            -DWITH_TESTS=OFF
          cmake --build /tmp/libiio/build --target iio
          cmake --install /tmp/libiio/build

      - name: Build and install libad9361 from source
        run: |
          git clone --depth 1 https://github.com/analogdevicesinc/libad9361-iio.git /tmp/libad9361
          cmake -S /tmp/libad9361 -B /tmp/libad9361/build \
            -DCMAKE_INSTALL_PREFIX="$(brew --prefix)" \
            -DOSX_FRAMEWORK=OFF \
            -DCMAKE_FIND_FRAMEWORK=NEVER \
            -DLIBIIO_LIBRARIES="$(brew --prefix)/lib/libiio.dylib" \
            -DLIBIIO_INCLUDEDIR="$(brew --prefix)/include" \
            -DBUILD_TESTS=OFF
          cmake --build /tmp/libad9361/build
          cmake --install /tmp/libad9361/build

      - name: Install Conan
        run: |
          pip3 install conan --break-system-packages
          conan profile detect --force

      - name: Cache Conan packages
        uses: actions/cache@v4
        with:
          path: ~/.conan2
          key: ${{ runner.os }}-conan-${{ hashFiles('conanfile.py') }}
          restore-keys: |
            ${{ runner.os }}-conan-

      - name: Install dependencies with Conan
        run: |
          conan install . \
            --output-folder=build \
            --build=missing \
            -s build_type=Release \
            -s compiler.cppstd=20 \
            -c tools.system.package_manager:mode=install \
            -c tools.system.package_manager:sudo=True

      - name: Configure CMake
        run: cmake --preset ci-macos

      - name: Build
        run: cmake --build --preset ci-macos

# Note: Tests are currently disabled on macOS due to issues with the CI environment
#       and the need for further investigation to ensure reliable test execution.
